[package]
name = "fission"
version = "0.1.0"
description = "Fission — a Fusion-style parametric CAD app driving build123d"
authors = ["you"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "fission_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
libc = "0.2"
hidapi = "2"
serde = { version = "1", features = ["derive"] }
