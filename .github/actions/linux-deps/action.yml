name: Linux system dependencies
description: >
  The Tauri webkit build stack for ubuntu-22.04 (NO OCCT/cmake - the default
  build links no OpenCASCADE). The ONE definition shared by the test, build,
  and rust-geom-check jobs - change the package list here, nowhere else.
runs:
  using: composite
  steps:
    - name: Install Linux system dependencies (Tauri webkit stack; NO OCCT/cmake)
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential curl wget file \
          libssl-dev libgtk-3-dev \
          libayatana-appindicator3-dev librsvg2-dev \
          libudev-dev \
          patchelf libfuse2
