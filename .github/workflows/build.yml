# Cross-platform build + bundle for SindriCAD (Tauri 2 + bundled Python sidecar).
#
# No system OpenCASCADE anywhere: the Rust/OCCT path is behind the off-by-default
# `rust-geom` feature (see src-tauri/Cargo.toml), and the shipping geometry runs in the
# Python sidecar, whose cadquery-ocp-novtk wheels bundle their own OCCT. So this
# workflow has NO "build OCCT from source / brew / vcpkg" steps (they were removed when
# Move 1 gated OCCT out).
#
# Per OS it: builds a relocatable Python "sidecar-runtime" (uv + python-build-standalone
# installed from sidecar/uv.lock), then runs `tauri build` with the bundle-only config
# that ships that runtime as a resource, and uploads the installers.
#
# Scope: x86_64 Linux, Apple Silicon macOS, x86_64 Windows. (No Intel-mac / linux-arm64.)

name: build

on:
  push:
    branches: [main, sindricad]
  pull_request:
  workflow_dispatch:

jobs:
  # Gates the build matrix: sidecar tests, Rust unit tests, and the (new) vitest
  # frontend tests all run BEFORE any installer is built. Runs once on Linux only —
  # the build matrix below still builds/bundles on all three platforms regardless.
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Same system deps as the build job's Linux leg: `cargo test --lib` links the
      # tauri crate, which needs the webkit2gtk stack + libudev (Rust device APIs).
      - name: Install Linux system dependencies
        uses: ./.github/actions/linux-deps

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend unit tests (vitest)
        run: npx vitest run

      - name: Install Python 3.12 + sync sidecar deps (locked)
        run: |
          uv python install 3.12
          cd sidecar && uv sync

      # The sidecar test files are `__main__` scripts, NOT pytest-discoverable
      # (`pytest sidecar/` silently collects 0 tests — see docs/IMPROVEMENT-AUDIT.md
      # §5.1) — so run each directly with the synced venv's interpreter.
      - name: Sidecar tests (direct __main__ invocation, not pytest)
        working-directory: sidecar
        run: |
          uv run python test_smoke.py
          uv run python test_geomstore.py
          uv run python test_selector_v2.py
          uv run python test_ws.py

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib

  build:
    needs: test
    permissions:
      contents: write # tauri-action may attach artifacts to a draft release
    strategy:
      fail-fast: false # one OS failing must not hide the others' status
      matrix:
        include:
          # ubuntu-22.04: webkit2gtk-4.1 + a lower glibc, so the AppImage/.deb runs
          # on more systems than a -24.04 build would.
          - platform: ubuntu-22.04
          - platform: macos-14 # Apple Silicon (arm64) runner
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        # third_party/opencascade-rs is vendored in-repo (no submodules), and the
        # default build never compiles it, so a plain checkout is enough.

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        uses: ./.github/actions/linux-deps

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install frontend dependencies
        run: npm ci

      # --- the bundled Python geometry runtime (relocatable, novtk, from the lock) ---
      - name: Build sidecar runtime (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: bash scripts/build-sidecar-runtime.sh

      - name: Build sidecar runtime (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./scripts/build-sidecar-runtime.ps1

      # --- build + bundle. The bundle-only config ships sidecar-runtime/ as a resource
      #     and (on macOS) turns on hardened runtime + entitlements. ---
      - name: Build + bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # UNSIGNED builds for now (Apple Developer Program deferred — no budget).
          # macOS ships unsigned (open via right-click -> Open); Windows unsigned runs
          # with a SmartScreen warning. To SIGN later: add the APPLE_* / Windows
          # signing secrets back here AND append the signing config, i.e.
          #   args: --config src-tauri/tauri.bundle.conf.json --config src-tauri/tauri.macos-sign.conf.json
        with:
          # bundle-only config ships sidecar-runtime/ as a resource. (No macOS signing
          # block here, so tauri produces an unsigned .app without attempting codesign.)
          args: --config src-tauri/tauri.bundle.conf.json

      # KNOWN FOLLOW-UP (macOS notarization): notarization is NOT recursive, so every
      # embedded Mach-O under sidecar-runtime (libpython + the cadquery-ocp .dylibs)
      # must be signed with the hardened runtime. If notarization fails on the first
      # signed mac run, add a recursive `codesign --force --options runtime --sign
      # "$APPLE_SIGNING_IDENTITY"` pass over src-tauri/sidecar-runtime BEFORE this step.
      # Windows Authenticode: set bundle.windows.signCommand in the bundle config +
      # a signing secret to clear SmartScreen (optional; unsigned still runs).

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sindricad-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe

  # docs/IMPROVEMENT-AUDIT.md §5.4: the opt-in `rust-geom` feature (src-tauri/src/geom.rs,
  # 2320 lines / 67 unwrap-or-expect calls) is never compiled by the `build` job above
  # (default build is OCCT-free by design — see the Cargo.toml comment on the feature),
  # so it can silently bit-rot. This job is a manual, non-gating bit-rot check: it does
  # NOT run on push/PR and nothing `needs:` it.
  #
  # ubuntu-22.04's package repos top out around OCCT 7.6, but opencascade-sys (the
  # vendored third_party/opencascade-rs fork) requires OCCT >= 7.9, which isn't
  # available as a hosted-runner apt package — so this step is EXPECTED TO FAIL on
  # today's runners until either a newer runner image ships OCCT >= 7.9, or a step is
  # added here to build OCCT >= 7.9 from source (slow; deliberately not done today).
  # Trigger to revisit: when a runner image with OCCT 7.9 exists, or when rust-geom
  # gets promoted off the experimental-spike path.
  rust-geom-check:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        uses: ./.github/actions/linux-deps

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo check --features rust-geom (expected to fail without OCCT >= 7.9)
        working-directory: src-tauri
        run: cargo check --features rust-geom
