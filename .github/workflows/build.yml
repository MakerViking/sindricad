# Cross-platform build for SindriCAD (Tauri 2 + Rust + system OCCT).
#
# STATUS / HONESTY NOTE
# ---------------------
# This workflow is a SCAFFOLD. Only the Linux leg mirrors a build that has been
# run and verified locally on Arch (system OCCT 7.9.3). The macOS and Windows
# legs are written from documentation + research and have NOT been executed.
# Treat them as a starting point, not a green pipeline. See docs/PACKAGING.md
# ("UNTESTED / RISKS") for the full list of unknowns.
#
# THE CENTRAL CONSTRAINT: OCCT VERSION
# ------------------------------------
# The vendored opencascade-rs fork (third_party/opencascade-rs) links the SYSTEM
# OpenCASCADE. Its build script (crates/opencascade-sys/build.rs) enforces
# major == 7 && minor >= 8, and its C++ bridge sources are patched for the 7.9.x
# API. So in practice we need OCCT 7.9.x on every runner:
#
#   * Linux  : Ubuntu apt ships OCCT 7.6 (Noble/24.04) -> FAILS the version gate
#              AND predates the 7.9 API the bridge expects. We therefore BUILD
#              OCCT 7.9.3 FROM SOURCE here. (apt is intentionally NOT used.)
#   * macOS  : Homebrew `opencascade` is 7.9.3 -> exact match. Cleanest leg.
#   * Windows: vcpkg `opencascade` is 7.9.0 -> passes the gate; 7.9.0 vs 7.9.3
#              is a patch-level diff so the API should match, but UNVERIFIED,
#              and MSVC + OCCT + the cxx bridge is the biggest unknown overall.
#
# DEP_OCCT_ROOT points cmake's find_package(OpenCASCADE) at the install prefix.
# CMAKE_POLICY_VERSION_MINIMUM=3.5 is needed because OCCT's CMake config and the
# fork's helper CMakeLists declare an old minimum that CMake 4 rejects otherwise.

name: build

on:
  push:
    branches: [main, sindricad]
  pull_request:
  workflow_dispatch:

# Pin the OCCT version in one place so the from-source (Linux) and the package
# managers (brew/vcpkg) stay aligned with the fork's 7.9 binding.
env:
  OCCT_VERSION: "7.9.3"

jobs:
  build:
    permissions:
      contents: write # tauri-action can create a draft release to attach artifacts
    strategy:
      fail-fast: false # one OS failing should not hide the status of the others
      matrix:
        include:
          # Build on ubuntu-22.04 (not -latest/24.04): it provides webkit2gtk-4.1
          # AND a lower glibc, so the produced AppImage/.deb runs on more systems.
          - platform: ubuntu-22.04
          - platform: macos-latest # arm64 runner; produces an arm64 .app/.dmg
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          # The fork under third_party/ contains an OCCT/ submodule used only for
          # the `builtin` (from-source) feature, which we DO NOT enable. Recursive
          # checkout is harmless and avoids surprises if that ever changes.
          submodules: recursive

      # ----------------------------------------------------------------------
      # Linux system deps: Tauri webkit2gtk stack + tools to build OCCT.
      # ----------------------------------------------------------------------
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            cmake \
            ninja-build \
            tcl-dev tk-dev \
            libfreetype-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxext-dev libxmu-dev libxi-dev

      # ----------------------------------------------------------------------
      # OCCT 7.9.3 from source on Linux. Ubuntu's apt OCCT (7.6) is too old for
      # the fork, so we compile and install to /opt/occt and export it via
      # DEP_OCCT_ROOT. Cached because this is the slow step (~10-20 min cold).
      # NOTE: UNVERIFIED in CI. The exact -D flags below are a reasonable minimal
      # set (modeling kernel only, no Draw/test harness, no docs/samples); they
      # may need tuning if a required toolkit ends up disabled.
      # ----------------------------------------------------------------------
      - name: Cache OCCT (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        id: occt-cache
        uses: actions/cache@v4
        with:
          path: /opt/occt
          key: occt-${{ env.OCCT_VERSION }}-${{ matrix.platform }}-v1

      - name: Build OCCT from source (Linux)
        if: matrix.platform == 'ubuntu-22.04' && steps.occt-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          # OCCT release tags use underscores, e.g. V7_9_3.
          TAG="V${OCCT_VERSION//./_}"
          git clone --depth 1 --branch "$TAG" \
            https://github.com/Open-Cascade-SAS/OCCT.git occt-src
          cmake -S occt-src -B occt-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/opt/occt \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBUILD_LIBRARY_TYPE=Shared \
            -DBUILD_MODULE_Draw=OFF \
            -DBUILD_MODULE_Visualization=ON \
            -DBUILD_MODULE_ApplicationFramework=ON \
            -DBUILD_MODULE_DataExchange=ON \
            -DBUILD_DOC_Overview=OFF \
            -DUSE_TK=OFF
          cmake --build occt-build --parallel
          sudo cmake --install occt-build

      - name: Export DEP_OCCT_ROOT (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: echo "DEP_OCCT_ROOT=/opt/occt" >> "$GITHUB_ENV"

      # ----------------------------------------------------------------------
      # OCCT on macOS via Homebrew. The `opencascade` formula is 7.9.3 (exact
      # match for the binding). Homebrew's prefix differs by arch:
      #   * Apple Silicon (macos-latest): /opt/homebrew
      #   * Intel:                        /usr/local
      # `brew --prefix opencascade` gives the keg path directly.
      # ----------------------------------------------------------------------
      - name: Install OCCT (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          set -euxo pipefail
          brew update
          brew install opencascade
          OCCT_PREFIX="$(brew --prefix opencascade)"
          echo "DEP_OCCT_ROOT=${OCCT_PREFIX}" >> "$GITHUB_ENV"
          echo "Installed OCCT at ${OCCT_PREFIX}"
          brew list --versions opencascade || true

      # ----------------------------------------------------------------------
      # OCCT on Windows via vcpkg. THIS IS THE LEAST-CERTAIN LEG.
      # vcpkg ships opencascade 7.9.0 (passes the >=7.8 gate). We install with
      # the x64-windows (dynamic) triplet and point DEP_OCCT_ROOT at the
      # installed tree so find_package(OpenCASCADE) can locate OpenCASCADEConfig.
      # vcpkg is preinstalled on GitHub windows-latest at $VCPKG_INSTALLATION_ROOT.
      # UNKNOWNS: (1) does the fork's cxx bridge compile under MSVC against 7.9.0;
      # (2) will OpenCASCADE's CMake config be found at <root>/installed/<triplet>;
      # (3) DLL placement so the bundled app can find OCCT at runtime. See docs.
      # ----------------------------------------------------------------------
      - name: Install OCCT (Windows, vcpkg)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $triplet = "x64-windows"
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "opencascade:$triplet"
          $occtRoot = "$env:VCPKG_INSTALLATION_ROOT\installed\$triplet"
          # find_package looks under <root> for share/opencascade/*Config.cmake.
          "DEP_OCCT_ROOT=$occtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # Make OCCT DLLs discoverable for any test/run step and for bundling.
          "$occtRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "OCCT (vcpkg) installed at $occtRoot"

      # ----------------------------------------------------------------------
      # Toolchains.
      # ----------------------------------------------------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ----------------------------------------------------------------------
      # Build the Tauri app. tauri-action runs `beforeBuildCommand`
      # (npm run build) and then `tauri build`, and uploads the bundles.
      # CMAKE_POLICY_VERSION_MINIMUM=3.5 is set process-wide so OCCT's exported
      # CMake config and the fork's helper CMakeLists configure under CMake 4.
      # DEP_OCCT_ROOT was exported per-OS above.
      # ----------------------------------------------------------------------
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          # DEP_OCCT_ROOT comes from $GITHUB_ENV (set per-OS above).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # No tagName/releaseId -> tauri-action just builds (no release publish).
          # Bundle targets come from src-tauri/tauri.conf.json ("targets": "all").
          args: ""

      # ----------------------------------------------------------------------
      # Upload whatever bundles were produced. Paths cover the per-OS layouts
      # Tauri writes under src-tauri/target/release/bundle/.
      # ----------------------------------------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sindricad-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
